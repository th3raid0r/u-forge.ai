# Demo configuration for cli_demo
# This is a demo-specific config file and won't ship with the end product.
# It's separate from u-forge.toml which is used by the application.

[data]
import_file = "./defaults/data/memory.json"
schema_dir  = "./defaults/schemas"

[database]
# path = "./demo_data/kg"   # override the default DB location (default: <workspace>/demo_data/kg)
#clear = true              # set to true to wipe the DB before loading (default: false)

[fts]
[[fts.queries]]
query = "mayor"
limit = 3

[semantic]
[[semantic.queries]]
query = "Who is the leader of the Foundation?"
limit = 5

[rerank]
[[rerank.queries]]
query = "Who is the leader of the Foundation?"
semantic_limit = 6

[hybrid]
queries = ["Who is the leader of the Foundation?"]
alpha_sweep_query = "Who is the leader of the Foundation?"
alpha_sweep_values = [0.0, 0.5, 1.0]

[hybrid.config]
alpha = 0.5
fts_limit = 12
semantic_limit = 12
rerank = true
limit = 3
